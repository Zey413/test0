/* ===== BUILD REAL POLYGON BUILDINGS ===== */
function buildPoly(name,mat,h,coords,qid){
  const pts=coords.map(c=>G(c[0],c[1]));
  const shape=new THREE.Shape();
  shape.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)shape.lineTo(pts[i][0],pts[i][1]);
  shape.lineTo(pts[0][0],pts[0][1]);
  const geo=new THREE.ExtrudeGeometry(shape,{depth:h,bevelEnabled:false});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.rotation.x=-Math.PI/2;
  mesh.position.y=0;
  mesh.castShadow=true;mesh.receiveShadow=true;
  scene.add(mesh);
  // Calculate center
  let cx=0,cz=0;for(const p of pts){cx+=p[0];cz+=p[1];}cx/=pts.length;cz/=pts.length;
  let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
  for(const p of pts){minX=Math.min(minX,p[0]);maxX=Math.max(maxX,p[0]);minZ=Math.min(minZ,p[1]);maxZ=Math.max(maxZ,p[1]);}
  const bd={name,x:cx,z:cz,w:maxX-minX,d:maxZ-minZ,h,group:mesh,bounds:{minX:minX-1,maxX:maxX+1,minZ:minZ-1,maxZ:maxZ+1},pts};
  if(qid)bd.questId=qid;
  blds.push(bd);
  if(h>1)cols.push({minX:minX-1,maxX:maxX+1,minZ:minZ-1,maxZ:maxZ+1,maxY:h});
}

/* ===== ROADS FROM OSM DATA ===== */
function buildRoad(coords,width=3){
  const pts=coords.map(c=>{const p=G(c[0],c[1]);return new THREE.Vector3(p[0],.07,p[1]);});
  if(pts.length<2)return;
  // Create road as tube along path
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1];
    const dx=b.x-a.x,dz=b.z-a.z;
    const len=Math.sqrt(dx*dx+dz*dz);
    if(len<.5)continue;
    const cx=(a.x+b.x)/2,cz=(a.z+b.z)/2;
    const angle=Math.atan2(dx,dz);
    const road=new THREE.Mesh(new THREE.PlaneGeometry(width,len),Mr);
    road.rotation.x=-Math.PI/2;road.rotation.z=-angle;
    road.position.set(cx,.06,cz);road.receiveShadow=true;
    scene.add(road);
  }
}
for(const r of osmRoads)buildRoad(r,4);

function renderMM(){
  const w=mmC.width,h=mmC.height,cx=w/2,cy=h/2,sc=.18;

function aW(g,c,s){const p=g.userData.parts;if(!p)return;const sw=Math.sin(c)*.4*s;if(p.legL){p.legL.position.z=sw*.3;p.legL.position.y=.43+Math.abs(Math.sin(c))*.05;}if(p.legR){p.legR.position.z=-sw*.3;p.legR.position.y=.43+Math.abs(Math.cos(c))*.05;}if(p.armL){p.armL.position.z=-sw*.25;p.armL.rotation.x=-sw*.3;}if(p.armR){p.armR.position.z=sw*.25;p.armR.rotation.x=sw*.3;}if(p.torso)p.torso.position.y=1.08+Math.abs(Math.sin(c*2))*.02;}
function rP(g){const p=g.userData.parts;if(!p)return;if(p.legL){p.legL.position.z=0;p.legL.position.y=.43;}if(p.legR){p.legR.position.z=0;p.legR.position.y=.43;}if(p.armL){p.armL.position.z=0;p.armL.rotation.x=0;}if(p.armR){p.armR.position.z=0;p.armR.rotation.x=0;}if(p.torso)p.torso.position.y=1.08;}

/* ===== CONTROLS ===== */
document.addEventListener('click',()=>{if(!S.locked)R.domElement.requestPointerLock();});
document.addEventListener('pointerlockchange',()=>{S.locked=document.pointerLockElement===R.domElement;});
document.addEventListener('mousemove',e=>{if(!S.locked)return;S.yaw-=e.movementX*MS;S.pitch-=e.movementY*MS;S.pitch=Math.max(-1.45,Math.min(1.45,S.pitch));});
document.addEventListener('keydown',e=>{switch(e.code){case'KeyW':S.fwd=true;break;case'KeyS':S.back=true;break;case'KeyA':S.left=true;break;case'KeyD':S.right=true;break;case'ShiftLeft':case'ShiftRight':S.sprint=true;break;case'Space':if(S.canJump){S.vel.y=JF;S.canJump=false;}e.preventDefault();break;case'KeyF':S.tp=!S.tp;pM.visible=S.tp;break;case'KeyE':if(S.nearNPC){if(S.dO){S.dI++;const dl=npcD[S.nearNPC.name];if(!dl||S.dI>=dl.length)cD();else document.getElementById('dt').textContent=dl[S.dI];}else oD(S.nearNPC);}break;case'KeyQ':if(S.dO)cD();break;}});
document.addEventListener('keyup',e=>{switch(e.code){case'KeyW':S.fwd=false;break;case'KeyS':S.back=false;break;case'KeyA':S.left=false;break;case'KeyD':S.right=false;break;case'ShiftLeft':case'ShiftRight':S.sprint=false;break;}});
function oD(npc){S.dO=true;S.dI=0;const dl=npcD[npc.name];if(!dl)return;document.getElementById('dialog').style.display='block';document.getElementById('dn').textContent=npc.name;document.getElementById('dt').textContent=dl[0];if(!S.vis.has('n_'+npc.name)){S.vis.add('n_'+npc.name);const q=quests.find(q2=>q2.id==='talk3');if(q&&!q.done){q.count++;if(q.count>=q.need)cQ('talk3');}uQ();}}
function cD(){S.dO=false;document.getElementById('dialog').style.display='none';}

/* ===== GAME LOOP ===== */
const clock=new THREE.Clock();let lastPos=new THREE.Vector3().copy(pG.position);
function update(){
  const dt=Math.min(clock.getDelta(),.1);if(!S.locked)return;
  const yQ=new THREE.Quaternion().setFromEuler(new THREE.Euler(0,S.yaw,0));
  const fD=new THREE.Vector3(0,0,-1).applyQuaternion(yQ),rD=new THREE.Vector3(1,0,0).applyQuaternion(yQ);
  const mv=new THREE.Vector3();if(S.fwd)mv.add(fD);if(S.back)mv.sub(fD);if(S.right)mv.add(rD);if(S.left)mv.sub(rD);
  S.iM=mv.length()>.01;const wSp=S.sprint&&S.iM&&S.st>0;if(wSp)S.st=Math.max(0,S.st-SD*dt);else S.st=Math.min(MXS,S.st+SR*dt);
  const aSp=wSp&&S.st>0,spd=aSp?RS:WS;if(S.iM)mv.normalize().multiplyScalar(spd*dt);
  if(S.iM){const cs=aSp?14:8;S.wc+=dt*cs;if(!S.tp)S.hb=Math.sin(S.wc)*(aSp?.06:.03);aW(pM,S.wc,aSp?1.2:.8);if(S.tp)pM.rotation.y=S.yaw+Math.PI;}else{S.hb*=.85;rP(pM);}
  S.vel.y-=GR*dt;let nx=pG.position.x+mv.x,nz=pG.position.z+mv.z,ny=pG.position.y+S.vel.y*dt;
  for(const c of cols){if(nx>c.minX&&nx<c.maxX&&nz>c.minZ&&nz<c.maxZ&&ny<c.maxY){const ds=[{a:'x',v:c.minX-.5,d:Math.abs(nx-c.minX)},{a:'x',v:c.maxX+.5,d:Math.abs(nx-c.maxX)},{a:'z',v:c.minZ-.5,d:Math.abs(nz-c.minZ)},{a:'z',v:c.maxZ+.5,d:Math.abs(nz-c.maxZ)}];ds.sort((a,b)=>a.d-b.d);if(ds[0].a==='x')nx=ds[0].v;else nz=ds[0].v;}}
  if(ny<0){ny=0;S.vel.y=0;S.canJump=true;}nx=Math.max(-700,Math.min(700,nx));nz=Math.max(-700,Math.min(700,nz));pG.position.set(nx,ny,nz);
  const dM=pG.position.distanceTo(lastPos);if(aSp&&dM>.01){const rq=quests.find(q=>q.id==='run1km');if(rq&&!rq.done){rq.dist+=dM;rq.count=Math.floor(rq.dist);if(rq.dist>=rq.need)cQ('run1km');uQ();}}lastPos.copy(pG.position);
  if(S.tp){const cD2=6,cH=3;const oQ=new THREE.Quaternion().setFromEuler(new THREE.Euler(S.pitch*.3,S.yaw,0,'YXZ'));const off=new THREE.Vector3(0,cH,cD2).applyQuaternion(oQ);cam.position.copy(off);const tgt=new THREE.Vector3(pG.position.x,pG.position.y+PH,pG.position.z);cam.lookAt(tgt);}
  else{cam.position.set(0,PH+S.hb,0);cam.quaternion.setFromEuler(new THREE.Euler(S.pitch,S.yaw,0,'YXZ'));}
  let cNPC=null,cDist=5;for(const n of npcs){n.wa+=n.ws*dt;const wx=n.bx+Math.cos(n.wa)*n.wr*.3,wz=n.bz+Math.sin(n.wa)*n.wr*.3;const pvX=n.model.position.x,pvZ=n.model.position.z;n.model.position.x=wx;n.model.position.z=wz;if(Math.abs(wx-pvX)+Math.abs(wz-pvZ)>.001){n.wc+=dt*5;aW(n.model,n.wc,.5);n.model.rotation.y=Math.atan2(wx-pvX,wz-pvZ);}else rP(n.model);const dx=pG.position.x-n.model.position.x,dz=pG.position.z-n.model.position.z;const dist=Math.sqrt(dx*dx+dz*dz);if(dist<12)n.model.rotation.y=Math.atan2(dx,dz);if(dist<cDist){cDist=dist;cNPC=n;}}
  S.nearNPC=cNPC;document.getElementById('ihint').style.display=cNPC?'block':'none';
  let nB=null,nD2=35;for(const b of blds){const dx=pG.position.x-b.x,dz=pG.position.z-b.z;const dist=Math.sqrt(dx*dx+dz*dz);if(dist<nD2){nD2=dist;nB=b;}}
  if(nB){document.getElementById('ln').textContent=nB.name;const lbl=document.getElementById('blbl');lbl.textContent=nB.name;lbl.style.display=nD2<25?'block':'none';if(nB.questId&&nD2<25)cQ(nB.questId);if(nD2<25&&!S.vis.has('a_'+nB.name)){S.vis.add('a_'+nB.name);const eq=quests.find(q=>q.id==='explore5');if(eq&&!eq.done){eq.count++;if(eq.count>=eq.need)cQ('explore5');uQ();}}}
  else{document.getElementById('ln').textContent='北京体育大学';document.getElementById('blbl').style.display='none';}
  document.getElementById('cd').textContent=`${Math.round(nx)}, ${Math.round(nz)}`;
  document.getElementById('sd').textContent=aSp?'🏃 奔跑':S.iM?'🚶 步行':'⏸ 站立';
  document.getElementById('sf').style.width=(S.st/MXS*100)+'%';document.getElementById('sf').style.background=S.st<20?'#f44336':S.st<50?'#FF9800':'#4CAF50';
  S.gt+=dt*8;if(S.gt>24*60)S.gt-=24*60;document.getElementById('gt').textContent=`🕐 ${String(Math.floor(S.gt/60)).padStart(2,'0')}:${String(Math.floor(S.gt%60)).padStart(2,'0')}`;
  const dP=S.gt/(24*60),sA=dP*Math.PI*2-Math.PI/2,sH=Math.sin(sA);sun.position.set(200*Math.cos(sA),Math.max(15,350*sH),150);sun.intensity=Math.max(.08,sH*1.3);amb.intensity=Math.max(.12,.25+sH*.3);
  if(sH>.05)scene.background.setHSL(.56,.55,.28+sH*.42);else scene.background.setHSL(.62,.25,Math.max(.02,.02+(sH+.1)*1.5));scene.fog.color.copy(scene.background);
  renderMM();
}
function animate(){requestAnimationFrame(animate);update();R.render(scene,cam);}
setTimeout(()=>{document.getElementById('loading').style.opacity='0';setTimeout(()=>document.getElementById('loading').style.display='none',800);animate();},800);
window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});
</script>
