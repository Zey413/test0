<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北京体育大学 - 3D校园探索</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Microsoft YaHei','PingFang SC',sans-serif}
canvas{display:block}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .8s}
#loading h1{color:#e94560;font-size:48px;margin-bottom:8px;text-shadow:0 0 30px rgba(233,69,96,.5);letter-spacing:6px}
#loading h2{color:#fff;font-size:18px;margin-bottom:6px;font-weight:normal;opacity:.8}
#loading h3{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:35px;font-weight:normal}
#loading .bar-bg{width:360px;height:4px;background:rgba(255,255,255,.1);border-radius:2px}
#loading .bar{height:100%;background:linear-gradient(90deg,#e94560,#ff6b6b);border-radius:2px;transition:width .3s;width:0%}
#loading .tip{color:rgba(255,255,255,.4);margin-top:18px;font-size:12px}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.5)}
#crosshair::before{width:2px;height:20px;left:9px;top:0}
#crosshair::after{width:20px;height:2px;left:0;top:9px}
#minimap{position:absolute;bottom:20px;right:20px;width:220px;height:220px;background:rgba(0,0,0,.8);border:2px solid rgba(255,255,255,.2);border-radius:8px;overflow:hidden}
#minimap canvas{width:100%;height:100%}
#info-panel{position:absolute;top:16px;left:16px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 16px;color:#fff;min-width:170px;backdrop-filter:blur(8px)}
#info-panel .title{font-size:15px;color:#e94560;margin-bottom:5px;font-weight:bold}
#info-panel .sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
#dialog{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);border:2px solid #e94560;border-radius:14px;padding:18px 24px;color:#fff;max-width:520px;min-width:360px;display:none;backdrop-filter:blur(10px);pointer-events:auto}
#dialog .nn{color:#e94560;font-size:14px;font-weight:bold;margin-bottom:5px}
#dialog .nt{font-size:13px;line-height:1.7}
#dialog .hint{font-size:10px;color:rgba(255,255,255,.3);margin-top:8px;text-align:right}
#controls-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);border-radius:8px;padding:6px 16px;color:rgba(255,255,255,.5);font-size:10px;text-align:center;backdrop-filter:blur(4px)}
#interact-hint{position:absolute;top:55%;left:50%;transform:translate(-50%,0);color:#fff;font-size:12px;background:rgba(233,69,96,.85);padding:3px 12px;border-radius:16px;display:none}
#building-label{position:absolute;top:62%;left:50%;transform:translate(-50%,0);color:#fff;font-size:15px;font-weight:bold;text-shadow:0 2px 8px rgba(0,0,0,.8);display:none;text-align:center;pointer-events:none}
#quest-panel{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px;color:#fff;width:220px;backdrop-filter:blur(8px);max-height:50vh;overflow-y:auto}
#quest-panel .qt{font-size:12px;color:#ffd700;margin-bottom:6px;font-weight:bold}
#quest-panel .qi{font-size:10px;color:rgba(255,255,255,.6);margin:2px 0}
#quest-panel .qi.done{color:rgba(255,255,255,.2);text-decoration:line-through}
#quest-panel .sep{border-top:1px solid rgba(255,255,255,.08);margin:6px 0}
#notif-container{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
.notif{background:rgba(233,69,96,.9);color:#fff;padding:6px 20px;border-radius:20px;font-size:13px;white-space:nowrap;animation:nA 2.5s forwards}
@keyframes nA{0%{opacity:0;transform:translateY(12px)}15%{opacity:1;transform:translateY(0)}75%{opacity:1}100%{opacity:0;transform:translateY(-12px)}}
#stamina-bar{position:absolute;bottom:45px;left:50%;transform:translateX(-50%);width:140px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
#stamina-fill{height:100%;background:#4CAF50;transition:width .1s;width:100%;border-radius:2px}
</style>
</head>
<body>
<div id="loading">
  <h1>北京体育大学</h1>
  <h2>Beijing Sport University</h2>
  <h3>3D 校园探索游戏 · 基于OpenStreetMap真实数据</h3>
  <div class="bar-bg"><div class="bar" id="load-bar"></div></div>
  <div class="tip" id="load-tip">正在初始化…</div>
</div>
<div id="hud">
  <div id="crosshair"></div>
  <div id="minimap"><canvas id="minimap-canvas" width="220" height="220"></canvas></div>

    <div class="title" id="location-name">北京体育大学</div>

  <div id="notif-container"></div>
  <div id="stamina-bar"><div id="stamina-fill"></div></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';

/*========== CONFIG ==========*/
const PH=1.72,WS=4.5,RS=9,JF=7,GR=18,MS=0.002,MXS=100,SD=15,SR=20;

/*========== STATE ==========*/
const S={locked:false,vel:new THREE.Vector3(),fwd:false,back:false,left:false,right:false,sprint:false,canJump:true,yaw:0,pitch:0,tp:false,nearNPC:null,dlgOpen:false,dlgIdx:0,visited:new Set(),gt:8*60,stam:MXS,wc:0,hb:0,isM:false};

/*========== SCENE ==========*/
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);
scene.fog=new THREE.FogExp2(0x87CEEB,0.001);
const camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.1,2500);
const R=new THREE.WebGLRenderer({antialias:true});
R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));
R.shadowMap.enabled=true;R.shadowMap.type=THREE.PCFSoftShadowMap;
R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.1;
document.body.appendChild(R.domElement);

/*========== LIGHTS ==========*/
const amb=new THREE.AmbientLight(0x506080,.55);scene.add(amb);
const sun=new THREE.DirectionalLight(0xfff5e0,1.3);
sun.position.set(200,350,150);sun.castShadow=true;
sun.shadow.mapSize.set(4096,4096);sun.shadow.camera.near=1;sun.shadow.camera.far=1500;
const sc=600;sun.shadow.camera.left=-sc;sun.shadow.camera.right=sc;sun.shadow.camera.top=sc;sun.shadow.camera.bottom=-sc;
scene.add(sun);scene.add(new THREE.HemisphereLight(0x87CEEB,0x3a5f3a,.35));

/*========== MATERIALS ==========*/
const M={
  ground:new THREE.MeshLambertMaterial({color:0x4a7a4a}),
  road:new THREE.MeshLambertMaterial({color:0x505050}),
  path:new THREE.MeshLambertMaterial({color:0xc8c0a8}),
  concrete:new THREE.MeshLambertMaterial({color:0xa8a8a0}),
  track:new THREE.MeshLambertMaterial({color:0xCC3333}),
  grass:new THREE.MeshLambertMaterial({color:0x2d8c2d}),
  glass:new THREE.MeshPhongMaterial({color:0x88ccff,transparent:true,opacity:0.35,shininess:120}),
  metal:new THREE.MeshPhongMaterial({color:0xc0c0c0,shininess:60}),
  gold:new THREE.MeshPhongMaterial({color:0xDAA520,shininess:50}),
  white:new THREE.MeshLambertMaterial({color:0xf5f5f0}),
  darkRed:new THREE.MeshPhongMaterial({color:0x8B0000}),
  gate:new THREE.MeshPhongMaterial({color:0xC0A040,flatShading:true}),
  trunk:new THREE.MeshLambertMaterial({color:0x6B4226}),
  leaf:[new THREE.MeshLambertMaterial({color:0x228B22}),new THREE.MeshLambertMaterial({color:0x2E8B57}),new THREE.MeshLambertMaterial({color:0x1a7a1a})],
};
// Building colors
const BC=[
  new THREE.MeshPhongMaterial({color:0xd4c5a0,flatShading:true}),
  new THREE.MeshPhongMaterial({color:0xc0b090,flatShading:true}),
  new THREE.MeshPhongMaterial({color:0xe8e0d0,flatShading:true}),
  new THREE.MeshPhongMaterial({color:0xb0a888,flatShading:true}),
  new THREE.MeshPhongMaterial({color:0x8090a0,flatShading:true}),
  new THREE.MeshPhongMaterial({color:0x4682B4,flatShading:true}),
  new THREE.MeshPhongMaterial({color:0xB22222,flatShading:true}),
  new THREE.MeshPhongMaterial({color:0x7a2020}),
  new THREE.MeshPhongMaterial({color:0x556655}),
];

/*========== HELPERS ==========*/
const buildings=[],colliders=[];
function lp(p,t){document.getElementById('load-bar').style.width=p+'%';document.getElementById('load-tip').textContent=t;}
function bx(w,h,d,m){const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.castShadow=true;o.receiveShadow=true;return o;}
function pl(w,d,m,y=.05){const o=new THREE.Mesh(new THREE.PlaneGeometry(w,d),m);o.rotation.x=-Math.PI/2;o.position.y=y;o.receiveShadow=true;return o;}

/*========== COORDINATE SYSTEM ==========*/
/*
 * Real data from OpenStreetMap (ODbL license)
 * Campus center: lat=40.0225, lon=116.3125
 * 1° lat ≈ 111,000m, 1° lon at 40°N ≈ 85,176m
 * Game: x = east(+), z = north(+)
 * Conversion: x=(lon-cLon)*85176, z=(lat-cLat)*111000
 */
const cLat=40.0225,cLon=116.3125;
function geo(lat,lon){return{x:(lon-cLon)*85176,z:(lat-cLat)*111000};}

/*========== BUILDING FACTORY ==========*/
function addB(name,lat,lon,w,d,h,matIdx,opts={}){
  const p=geo(lat,lon);const x=p.x,z=p.z;
  const mat=BC[matIdx%BC.length];
  const g=new THREE.Group();
  const body=bx(w,h,d,mat);body.position.y=h/2;g.add(body);
  // windows
  if(h>4){
    const fl=Math.floor(h/3.2),wPF=Math.max(2,Math.floor(w/3.5)),wG=new THREE.PlaneGeometry(1.4,1.8);
    for(let f=0;f<fl;f++){const wy=2.2+f*3.2;if(wy>h-1.5)break;
      for(let i=0;i<wPF;i++){const wx=-w/2+(i+.5)*(w/wPF);
        for(const s of[1,-1]){const wm=new THREE.Mesh(wG,M.glass);wm.position.set(wx,wy,s*(d/2+.02));if(s<0)wm.rotation.y=Math.PI;g.add(wm);}
    }}
  }
  if(opts.entrance){const pr=bx(Math.min(7,w*.3),3.5,2.5,M.concrete);pr.position.set(0,1.75,d/2+1.25);g.add(pr);}
  if(opts.roof){const rf=bx(w+.5,.4,d+.5,BC[opts.roof]);rf.position.y=h+.2;g.add(rf);}
  const base=bx(w+.3,.25,d+.3,M.concrete);base.position.y=.125;g.add(base);
  if(opts.rot)g.rotation.y=opts.rot;
  g.position.set(x,0,z);scene.add(g);
  const pad=1;
  const bd={name,x,z,w,d,h,group:g,bounds:{minX:x-w/2-pad,maxX:x+w/2+pad,minZ:z-d/2-pad,maxZ:z+d/2+pad}};
  if(opts.qid)bd.questId=opts.qid;
  buildings.push(bd);if(h>1)colliders.push({...bd.bounds,maxY:h});
  return g;
}
function addArena(name,lat,lon,w,d,h,matIdx,opts={}){
  const p=geo(lat,lon);const x=p.x,z=p.z;
  const mat=BC[matIdx%BC.length];
  const g=new THREE.Group();
  const body=bx(w,h,d,mat);body.position.y=h/2;g.add(body);
  const rf=new THREE.Mesh(new THREE.CylinderGeometry(w/2*.95,w/2*.95,d*1.02,24,1,false,0,Math.PI),M.metal);
  rf.rotation.x=Math.PI/2;rf.rotation.z=Math.PI/2;rf.position.y=h;g.add(rf);
  const pr=bx(8,4,3,M.concrete);pr.position.set(0,2,d/2+1.5);g.add(pr);
  const base=bx(w+.3,.25,d+.3,M.concrete);base.position.y=.125;g.add(base);
  g.position.set(x,0,z);scene.add(g);
  const pad=2;
  const bd={name,x,z,w,d,h:h+w/2*.6,group:g,bounds:{minX:x-w/2-pad,maxX:x+w/2+pad,minZ:z-d/2-pad,maxZ:z+d/2+pad+3}};
  if(opts.qid)bd.questId=opts.qid;
  buildings.push(bd);colliders.push({...bd.bounds,maxY:h});
  return g;
}

lp(5,'生成地形…');

/*========== GROUND ==========*/
scene.add(pl(1600,1600,M.ground,0));
for(let i=0;i<50;i++){const a=(i/50)*Math.PI*2,dist=650+Math.random()*200;
  const m=bx(15+Math.random()*35,12+Math.random()*50,15+Math.random()*35,new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(0,0,.45+Math.random()*.25)}));
  m.position.set(Math.cos(a)*dist,m.geometry.parameters.height/2,Math.sin(a)*dist);scene.add(m);}

lp(10,'铺设道路…');

/*========== ROADS (based on real campus layout) ==========*/
function road(x,z,w,d){const m=pl(w,d,M.road);m.position.set(x,.06,z);scene.add(m);}
function pth(x,z,w,d){const m=pl(w,d,M.path);m.position.set(x,.07,z);scene.add(m);}
// Main N-S axis
road(0,0,10,900);
// E-W roads at actual positions
road(0,-370,500,8); // south near 体育馆
road(0,-200,500,8); // mid-south near office bldgs
road(0,-80,450,8);  // mid near library
road(0,80,400,7);   // near sports fields
road(0,200,400,7);  // north sports area
road(0,350,350,6);  // far north
// N-S side roads
road(-200,0,7,700); road(200,0,7,700);
road(100,0,6,600); road(-100,0,6,600);
road(300,-100,6,500); road(350,0,6,400);
// Outer boundary
road(-280,0,6,900); road(420,0,6,900);
road(0,-480,720,6); road(0,450,720,6);
// Paths
pth(50,-300,3,200);pth(-50,-300,3,200);pth(200,100,3,300);pth(300,-50,3,300);

lp(18,'建造校门…');

/*========== 南大门 (OSM: campus boundary at ~40.019, south side) ==========*/
(function(){
  const p=geo(40.0188,116.3125);const g=new THREE.Group();
  for(const sx of[-12,12]){const pi=bx(3.5,14,3,M.gate);pi.position.set(sx,7,0);g.add(pi);const cap=bx(4.5,1,4,M.gate);cap.position.set(sx,14.5,0);g.add(cap);}
  const beam=bx(28,2.5,3,M.gate);beam.position.set(0,12,0);g.add(beam);
  const sign=bx(22,3.5,.6,M.darkRed);sign.position.set(0,15,0);g.add(sign);
  const tc=document.createElement('canvas');tc.width=512;tc.height=72;const tx=tc.getContext('2d');tx.fillStyle='#fff';tx.font='bold 56px "Microsoft YaHei","SimHei",sans-serif';tx.textAlign='center';tx.fillText('北京体育大学',256,55);
  const tm=new THREE.Mesh(new THREE.PlaneGeometry(18,2.5),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(tc),transparent:true}));tm.position.set(0,15,.35);g.add(tm);
  for(const sx of[-20,20]){const sp=bx(2,9,2.5,M.gate);sp.position.set(sx,4.5,0);g.add(sp);}
  for(const sx of[-26,26]){const gd=bx(7,3.5,5,BC[2]);gd.position.set(sx,1.75,0);g.add(gd);}
  g.position.set(p.x,0,p.z);scene.add(g);
  buildings.push({name:'南大门（正门）',x:p.x,z:p.z,w:60,d:8,h:16,group:g,bounds:{minX:p.x-32,maxX:p.x+32,minZ:p.z-5,maxZ:p.z+5},questId:'gate'});
})();
// 北门
(function(){const p=geo(40.0285,116.3125);const g=new THREE.Group();
  for(const sx of[-8,8]){const pi=bx(2.5,8,2.5,BC[1]);pi.position.set(sx,4,0);g.add(pi);}
  const b=bx(20,1.5,2,BC[1]);b.position.set(0,8.5,0);g.add(b);
  g.position.set(p.x,0,p.z);scene.add(g);
  buildings.push({name:'北门',x:p.x,z:p.z,w:22,d:5,h:9,group:g,bounds:{minX:p.x-12,maxX:p.x+12,minZ:p.z-3,maxZ:p.z+3}});
})();

lp(22,'铺设冠军之路…');

/*========== 冠军之路 ==========*/
(function(){
  const g=new THREE.Group();g.add(pl(8,200,M.gold,.08));
  for(let i=0;i<50;i++){const px=(Math.random()-.5)*5,pz=-95+i*3.8;
    const br=bx(1,.06,.8,new THREE.MeshPhongMaterial({color:0xC8A838,shininess:40}));br.position.set(px,.11,pz);g.add(br);
    if(i%3===0){const pl2=bx(.8,.3,.6,M.gold);pl2.position.set(px+(Math.random()-.5)*2,.15,pz);g.add(pl2);}
  }
  for(let i=0;i<20;i++){for(const sx of[-5.5,5.5]){
    const pole=new THREE.Mesh(new THREE.CylinderGeometry(.06,.08,4.5),M.metal);pole.position.set(sx,2.25,-95+i*10);g.add(pole);
    const lamp=new THREE.Mesh(new THREE.SphereGeometry(.25,6,4),new THREE.MeshPhongMaterial({color:0xffffdd,emissive:0xffff88,emissiveIntensity:.15}));lamp.position.set(sx,4.7,-95+i*10);g.add(lamp);
  }}
  const stone=bx(4,2.5,1.2,M.darkRed);stone.position.set(0,1.25,105);g.add(stone);
  const cp=geo(40.0195,116.3125);
  g.position.set(cp.x,0,cp.z);scene.add(g);
  buildings.push({name:'冠军之路',x:cp.x,z:cp.z,w:8,d:200,h:.2,group:g,bounds:{minX:cp.x-6,maxX:cp.x+6,minZ:cp.z-100,maxZ:cp.z+100},questId:'champion'});
})();

lp(28,'建造教学楼…');

/*=============================================
  BUILDINGS PLACED USING OSM COORDINATES
  Data source: OpenStreetMap (ODbL)
=============================================*/

// 教学楼 (40.0214, 116.3139)
addB('教学楼',40.0214,116.3139,55,20,20,0,{entrance:true,roof:7});
// 第二教学楼 (40.0215, 116.3125)
addB('第二教学楼',40.0215,116.3125,45,18,18,0,{entrance:true,roof:7});
// 南办公楼 (40.0201, 116.3128)
addB('南办公楼',40.0201,116.3128,50,18,16,2,{entrance:true,roof:8});
// 北办公楼 (40.0207, 116.3127)
addB('北办公楼',40.0207,116.3127,50,18,16,2,{entrance:true,roof:8});

lp(35,'建造图书馆…');

// 图书馆 (40.0213, 116.3125)
(function(){
  const p=geo(40.0213,116.3125);const g=new THREE.Group();
  const main=bx(50,24,28,BC[2]);main.position.y=12;g.add(main);
  const gf=new THREE.Mesh(new THREE.PlaneGeometry(48,22),M.glass);gf.position.set(0,12,14.1);g.add(gf);
  const gb=new THREE.Mesh(new THREE.PlaneGeometry(48,22),M.glass);gb.position.set(0,12,-14.1);gb.rotation.y=Math.PI;g.add(gb);
  for(let i=0;i<6;i++){const step=bx(18-i*.5,.25,1.2,M.concrete);step.position.set(0,.125+i*.25,15+i*1.2);g.add(step);}
  const top=bx(52,.8,30,M.metal);top.position.y=24.4;g.add(top);
  const wing=bx(15,18,18,BC[2]);wing.position.set(25,9,-6);g.add(wing);
  g.position.set(p.x,0,p.z);scene.add(g);
  buildings.push({name:'图书馆',x:p.x,z:p.z,w:60,d:32,h:24,group:g,bounds:{minX:p.x-32,maxX:p.x+32,minZ:p.z-18,maxZ:p.z+18},questId:'library'});
  colliders.push({minX:p.x-32,maxX:p.x+32,minZ:p.z-18,maxZ:p.z+18,maxY:24});
})();

lp(42,'建造体育场馆…');

// 英东田径场 (main track, 40.0237, 116.3104)
(function(){
  const p=geo(40.0237,116.3104);const g=new THREE.Group();
  const oRx=68,oRy=42,iRx=58,iRy=32;

const mmC=document.getElementById('minimap-canvas'),mmX=mmC.getContext('2d');
function renderMM(){
  const w=mmC.width,h=mmC.height,cx=w/2,cy=h/2,sc=.2;
  const px=pG.position.x,pz=pG.position.z;
  mmX.clearRect(0,0,w,h);
  // BG
  mmX.fillStyle='#1a2e1a';mmX.fillRect(0,0,w,h);
  // Roads
  mmX.fillStyle='#3a3a3a';mmX.fillRect(cx-1,0,3,h); // main NS road
  // Buildings with text
  mmX.font='bold 7px sans-serif';mmX.textAlign='center';
  for(const b of buildings){
    const bx2=cx+(b.x-px)*sc,bz=cy-(b.z-pz)*sc;
    const bw=Math.max(3,(b.w||20)*sc),bd=Math.max(3,(b.d||20)*sc);
    if(bx2+bw/2<-10||bx2-bw/2>w+10||bz+bd/2<-10||bz-bd/2>h+10)continue;
    mmX.fillStyle=b.questId?'#e94560':'#667';
    mmX.fillRect(bx2-bw/2,bz-bd/2,bw,bd);
    // Labels for nearby buildings
    if(bw>6&&b.name.length<12){
      mmX.fillStyle='rgba(255,255,255,.7)';

  // Player
  mmX.fillStyle='#ff0';mmX.beginPath();mmX.arc(cx,cy,4,0,Math.PI*2);mmX.fill();
  // Dir
  const dx=cx+Math.sin(S.yaw)*10,dy=cy+Math.cos(S.yaw)*10;
  mmX.strokeStyle='#ff0';mmX.lineWidth=2;mmX.beginPath();mmX.moveTo(cx,cy);mmX.lineTo(dx,dy);mmX.stroke();
  // Compass
  mmX.fillStyle='#fff';mmX.font='bold 10px sans-serif';
  mmX.fillText('N',cx,8);mmX.fillText('S',cx,h-3);mmX.fillText('E',w-6,cy+4);mmX.fillText('W',7,cy+4);
  // Border
  mmX.strokeStyle='rgba(255,255,255,.2)';mmX.lineWidth=1;mmX.strokeRect(0,0,w,h);
}

/*========== QUESTS ==========*/
const quests=[
  {id:'gate',text:'🚪 找到南大门',done:false,cat:'地标'},
  {id:'champion',text:'🏆 走过冠军之路',done:false,cat:'地标'},
  {id:'library',text:'📚 参观图书馆',done:false,cat:'地标'},
  {id:'track',text:'🏃 去田径场',done:false,cat:'场馆'},
  {id:'gym',text:'🏀 参观体育馆',done:false,cat:'场馆'},
  {id:'swim',text:'🏊 参观游泳馆',done:false,cat:'场馆'},
  {id:'canteen',text:'🍜 去食堂',done:false,cat:'生活'},
  {id:'talk3',text:'💬 和3位NPC对话',done:false,count:0,need:3,cat:'社交'},
  {id:'talk6',text:'💬 和6位NPC对话',done:false,count:0,need:6,cat:'社交'},
  {id:'explore5',text:'🗺️ 发现5个区域',done:false,count:0,need:5,cat:'探索'},
  {id:'run1km',text:'🏃‍♂️ 奔跑1000米',done:false,dist:0,count:0,need:1000,cat:'运动'},
];
function updateQ(){const el=document.getElementById('quest-list');el.innerHTML='';let lc='';for(const q of quests){if(q.cat!==lc){if(lc)el.appendChild(Object.assign(document.createElement('div'),{className:'sep'}));lc=q.cat;}const d=document.createElement('div');d.className='qi'+(q.done?' done':'');d.textContent=(q.done?'✅ ':'⬜ ')+q.text+(q.need&&!q.done?` (${q.count}/${q.need})`:'');el.appendChild(d);}}
function cQ(id){const q=quests.find(q2=>q2.id===id);if(q&&!q.done){q.done=true;updateQ();showN('✨ '+q.text);if(quests.every(q2=>q2.done))setTimeout(()=>showN('🎉 所有任务完成！'),1000);}}
function showN(t){const e=document.createElement('div');e.className='notif';e.textContent=t;document.getElementById('notif-container').appendChild(e);setTimeout(()=>e.remove(),2500);}
updateQ();

lp(95,'准备就绪！');

/*========== WALK ANIM ==========*/
function aW(g,c,s){const p=g.userData.parts;if(!p)return;const sw=Math.sin(c)*.4*s;
  if(p.legL){p.legL.position.z=sw*.3;p.legL.position.y=.43+Math.abs(Math.sin(c))*.05;}
  if(p.legR){p.legR.position.z=-sw*.3;p.legR.position.y=.43+Math.abs(Math.cos(c))*.05;}
  if(p.armL){p.armL.position.z=-sw*.25;p.armL.rotation.x=-sw*.3;}
  if(p.armR){p.armR.position.z=sw*.25;p.armR.rotation.x=sw*.3;}
  if(p.torso)p.torso.position.y=1.08+Math.abs(Math.sin(c*2))*.02;}
function rP(g){const p=g.userData.parts;if(!p)return;
  if(p.legL){p.legL.position.z=0;p.legL.position.y=.43;}if(p.legR){p.legR.position.z=0;p.legR.position.y=.43;}
  if(p.armL){p.armL.position.z=0;p.armL.rotation.x=0;}if(p.armR){p.armR.position.z=0;p.armR.rotation.x=0;}
  if(p.torso)p.torso.position.y=1.08;}

/*========== CONTROLS ==========*/
document.addEventListener('click',()=>{if(!S.locked)R.domElement.requestPointerLock();});
document.addEventListener('pointerlockchange',()=>{S.locked=document.pointerLockElement===R.domElement;});
document.addEventListener('mousemove',e=>{if(!S.locked)return;S.yaw-=e.movementX*MS;S.pitch-=e.movementY*MS;S.pitch=Math.max(-1.45,Math.min(1.45,S.pitch));});
document.addEventListener('keydown',e=>{switch(e.code){
  case'KeyW':S.fwd=true;break;case'KeyS':S.back=true;break;case'KeyA':S.left=true;break;case'KeyD':S.right=true;break;
  case'ShiftLeft':case'ShiftRight':S.sprint=true;break;
  case'Space':if(S.canJump){S.vel.y=JF;S.canJump=false;}e.preventDefault();break;
  case'KeyF':S.tp=!S.tp;pM.visible=S.tp;break;
  case'KeyE':if(S.nearNPC){if(S.dlgOpen){S.dlgIdx++;const dl=npcD[S.nearNPC.name];if(!dl||S.dlgIdx>=dl.length)closeDlg();else document.getElementById('dialog-text').textContent=dl[S.dlgIdx];}else openDlg(S.nearNPC);}break;
  case'KeyQ':if(S.dlgOpen)closeDlg();break;
}});
document.addEventListener('keyup',e=>{switch(e.code){case'KeyW':S.fwd=false;break;case'KeyS':S.back=false;break;case'KeyA':S.left=false;break;case'KeyD':S.right=false;break;case'ShiftLeft':case'ShiftRight':S.sprint=false;break;}});
function openDlg(npc){S.dlgOpen=true;S.dlgIdx=0;const dl=npcD[npc.name];if(!dl)return;document.getElementById('dialog').style.display='block';document.getElementById('dialog-name').textContent=npc.name;document.getElementById('dialog-text').textContent=dl[0];
  if(!S.visited.has('npc_'+npc.name)){S.visited.add('npc_'+npc.name);for(const q of quests)if((q.id==='talk3'||q.id==='talk6')&&!q.done){q.count++;if(q.count>=q.need)cQ(q.id);}updateQ();}}
function closeDlg(){S.dlgOpen=false;document.getElementById('dialog').style.display='none';}

/*========== GAME LOOP ==========*/
const clock=new THREE.Clock();
let lastPos=new THREE.Vector3().copy(pG.position);

function update(){
  const dt=Math.min(clock.getDelta(),.1);
  if(!S.locked)return;

  // Movement direction (always relative to yaw)
  const yawQ=new THREE.Quaternion().setFromEuler(new THREE.Euler(0,S.yaw,0));
  const fDir=new THREE.Vector3(0,0,-1).applyQuaternion(yawQ);
  const rDir=new THREE.Vector3(1,0,0).applyQuaternion(yawQ);
  const mv=new THREE.Vector3();
  if(S.fwd)mv.add(fDir);if(S.back)mv.sub(fDir);if(S.right)mv.add(rDir);if(S.left)mv.sub(rDir);
  S.isM=mv.length()>.01;
  const wantSp=S.sprint&&S.isM&&S.stam>0;
  if(wantSp)S.stam=Math.max(0,S.stam-SD*dt);else S.stam=Math.min(MXS,S.stam+SR*dt);
  const actSp=wantSp&&S.stam>0;
  const speed=actSp?RS:WS;
  if(S.isM)mv.normalize().multiplyScalar(speed*dt);

  // Walk anim
  if(S.isM){const cs=actSp?14:8;S.wc+=dt*cs;
    if(!S.tp)S.hb=Math.sin(S.wc)*(actSp?.06:.03);
    aW(pM,S.wc,actSp?1.2:.8);
    if(S.tp)pM.rotation.y=S.yaw+Math.PI;
  }else{S.hb*=.85;rP(pM);}

  S.vel.y-=GR*dt;
  let nx=pG.position.x+mv.x,nz=pG.position.z+mv.z,ny=pG.position.y+S.vel.y*dt;
  for(const c of colliders){if(nx>c.minX&&nx<c.maxX&&nz>c.minZ&&nz<c.maxZ&&ny<c.maxY){const ds=[{a:'x',v:c.minX-.5,d:Math.abs(nx-c.minX)},{a:'x',v:c.maxX+.5,d:Math.abs(nx-c.maxX)},{a:'z',v:c.minZ-.5,d:Math.abs(nz-c.minZ)},{a:'z',v:c.maxZ+.5,d:Math.abs(nz-c.maxZ)}];ds.sort((a,b)=>a.d-b.d);if(ds[0].a==='x')nx=ds[0].v;else nz=ds[0].v;}}
  if(ny<0){ny=0;S.vel.y=0;S.canJump=true;}
  nx=Math.max(-600,Math.min(600,nx));nz=Math.max(-600,Math.min(600,nz));
  pG.position.set(nx,ny,nz);

  // Run distance
  const dM=pG.position.distanceTo(lastPos);
  if(actSp&&dM>.01){const rq=quests.find(q=>q.id==='run1km');if(rq&&!rq.done){rq.dist+=dM;rq.count=Math.floor(rq.dist);if(rq.dist>=rq.need)cQ('run1km');updateQ();}}
  lastPos.copy(pG.position);

  /*=== CAMERA (FIXED THIRD PERSON) ===*/
  if(S.tp){
    // Camera orbits behind player, offset rotated by yaw+pitch
    const camDist=6,camH=3;
    const offQ=new THREE.Quaternion().setFromEuler(new THREE.Euler(S.pitch*.3,S.yaw,0,'YXZ'));
    const off=new THREE.Vector3(0,camH,camDist).applyQuaternion(offQ);
    camera.position.copy(off);
    // Look at player's head in WORLD space
    const target=new THREE.Vector3(pG.position.x,pG.position.y+PH,pG.position.z);
    camera.lookAt(target);
  }else{
    // First person
    camera.position.set(0,PH+S.hb,0);
    camera.quaternion.setFromEuler(new THREE.Euler(S.pitch,S.yaw,0,'YXZ'));
  }

  // NPCs
  let cNPC=null,cDist=5;
  for(const n of npcs){
    n.wa+=n.ws*dt;const wx=n.baseX+Math.cos(n.wa)*n.wr*.3,wz=n.baseZ+Math.sin(n.wa)*n.wr*.3;
    const pvX=n.model.position.x,pvZ=n.model.position.z;
    n.model.position.x=wx;n.model.position.z=wz;
    if(Math.abs(wx-pvX)+Math.abs(wz-pvZ)>.001){n.wc+=dt*5;aW(n.model,n.wc,.5);n.model.rotation.y=Math.atan2(wx-pvX,wz-pvZ);}else rP(n.model);
    const dx=pG.position.x-n.model.position.x,dz=pG.position.z-n.model.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<12)n.model.rotation.y=Math.atan2(dx,dz);
    if(dist<cDist){cDist=dist;cNPC=n;}
  }
  S.nearNPC=cNPC;document.getElementById('interact-hint').style.display=cNPC?'block':'none';

  // Building
  let nB=null,nD=35;
  for(const b of buildings){const dx=pG.position.x-b.x,dz=pG.position.z-b.z;const dist=Math.sqrt(dx*dx+dz*dz);if(dist<nD){nD=dist;nB=b;}}
  if(nB){document.getElementById('location-name').textContent=nB.name;const lbl=document.getElementById('building-label');lbl.textContent=nB.name;lbl.style.display=nD<25?'block':'none';
    if(nB.questId&&nD<25)cQ(nB.questId);
    if(nD<25&&!S.visited.has('area_'+nB.name)){S.visited.add('area_'+nB.name);const eq=quests.find(q=>q.id==='explore5');if(eq&&!eq.done){eq.count++;if(eq.count>=eq.need)cQ('explore5');updateQ();}}}
  else{document.getElementById('location-name').textContent='北京体育大学';document.getElementById('building-label').style.display='none';}

  // HUD
  document.getElementById('coord-display').textContent=`坐标: ${Math.round(nx)}, ${Math.round(nz)}`;
  document.getElementById('speed-display').textContent=actSp?'🏃 奔跑':S.isM?'🚶 步行':'⏸ 站立';
  document.getElementById('stamina-fill').style.width=(S.stam/MXS*100)+'%';
  document.getElementById('stamina-fill').style.background=S.stam<20?'#f44336':S.stam<50?'#FF9800':'#4CAF50';
  S.gt+=dt*8;if(S.gt>24*60)S.gt-=24*60;
  document.getElementById('game-time').textContent=`🕐 ${String(Math.floor(S.gt/60)).padStart(2,'0')}:${String(Math.floor(S.gt%60)).padStart(2,'0')}`;
  const dP=S.gt/(24*60),sA=dP*Math.PI*2-Math.PI/2,sH=Math.sin(sA);
  sun.position.set(200*Math.cos(sA),Math.max(15,350*sH),150);sun.intensity=Math.max(.08,sH*1.3);amb.intensity=Math.max(.12,.25+sH*.3);
  if(sH>.05)scene.background.setHSL(.56,.55,.28+sH*.42);else scene.background.setHSL(.62,.25,Math.max(.02,.02+(sH+.1)*1.5));
  scene.fog.color.copy(scene.background);
  renderMM();
}
function animate(){requestAnimationFrame(animate);update();R.render(scene,camera);}
setTimeout(()=>{document.getElementById('loading').style.opacity='0';setTimeout(()=>document.getElementById('loading').style.display='none',800);animate();},800);
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});
</script>
